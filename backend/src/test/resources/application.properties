# Каждый уникальный Spring test context получает собственную БД. Иначе durable
# jobs из соседнего integration-теста влияют на session quotas и cleanup.
spring.datasource.url=jdbc:h2:mem:jack-${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
jack.processing.public-requests-per-minute=10000
jack.processing.fixed-session-owner=11111111-1111-1111-1111-111111111111
