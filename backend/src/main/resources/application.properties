spring.application.name=jack
server.port=${JACK_SERVER_PORT:8080}

spring.datasource.url=${JACK_DB_URL:jdbc:postgresql://localhost:5432/jack}
spring.datasource.username=${JACK_DB_USERNAME:jack}
spring.datasource.password=${JACK_DB_PASSWORD:jack}
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.servlet.multipart.max-file-size=${JACK_MULTIPART_MAX_FILE_SIZE:64MB}
spring.servlet.multipart.max-request-size=${JACK_MULTIPART_MAX_REQUEST_SIZE:64MB}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

jack.web.allowed-origins=${JACK_WEB_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
jack.processing.storage-root=${JACK_PROCESSING_STORAGE_ROOT:${java.io.tmpdir}/jack-processing}
jack.processing.max-upload-size-bytes=${JACK_PROCESSING_MAX_UPLOAD_SIZE_BYTES:67108864}
jack.processing.max-concurrent-jobs=${JACK_PROCESSING_MAX_CONCURRENT_JOBS:4}
jack.processing.job-queue-capacity=${JACK_PROCESSING_JOB_QUEUE_CAPACITY:16}
jack.processing.public-requests-per-minute=${JACK_PROCESSING_PUBLIC_REQUESTS_PER_MINUTE:30}
jack.processing.ffmpeg-executable=${JACK_PROCESSING_FFMPEG_EXECUTABLE:ffmpeg}
jack.processing.ffprobe-executable=${JACK_PROCESSING_FFPROBE_EXECUTABLE:ffprobe}
jack.processing.media-preview-timeout-seconds=${JACK_PROCESSING_MEDIA_PREVIEW_TIMEOUT_SECONDS:240}
jack.processing.image-convert-executable=${JACK_PROCESSING_IMAGE_CONVERT_EXECUTABLE:convert}
jack.processing.potrace-executable=${JACK_PROCESSING_POTRACE_EXECUTABLE:potrace}
jack.processing.raw-preview-executable=${JACK_PROCESSING_RAW_PREVIEW_EXECUTABLE:dcraw_emu}
jack.processing.image-processing-timeout-seconds=${JACK_PROCESSING_IMAGE_PROCESSING_TIMEOUT_SECONDS:240}
jack.processing.tesseract-executable=${JACK_PROCESSING_TESSERACT_EXECUTABLE:tesseract}
jack.processing.pdf-toolkit-timeout-seconds=${JACK_PROCESSING_PDF_TOOLKIT_TIMEOUT_SECONDS:300}
jack.processing.pdf-toolkit-default-ocr-language=${JACK_PROCESSING_PDF_TOOLKIT_DEFAULT_OCR_LANGUAGE:eng}
jack.processing.cleanup-interval-millis=${JACK_PROCESSING_CLEANUP_INTERVAL_MILLIS:1800000}
jack.processing.upload-retention-hours=${JACK_PROCESSING_UPLOAD_RETENTION_HOURS:24}
jack.processing.artifact-retention-hours=${JACK_PROCESSING_ARTIFACT_RETENTION_HOURS:24}
jack.processing.job-retention-hours=${JACK_PROCESSING_JOB_RETENTION_HOURS:24}
jack.processing.max-concurrent-jobs-per-session=${JACK_PROCESSING_MAX_CONCURRENT_JOBS_PER_SESSION:2}
jack.processing.max-storage-bytes-per-session=${JACK_PROCESSING_MAX_STORAGE_BYTES_PER_SESSION:268435456}
jack.processing.session-cookie-name=${JACK_PROCESSING_SESSION_COOKIE_NAME:JACK_SESSION}
jack.processing.session-secret=${JACK_PROCESSING_SESSION_SECRET:jack-local-development-secret-change-in-production}
jack.processing.session-cookie-secure=${JACK_PROCESSING_SESSION_COOKIE_SECURE:false}
jack.processing.policy-version=${JACK_PROCESSING_POLICY_VERSION:jack-processing-2}
jack.processing.max-decoded-pixels=${JACK_PROCESSING_MAX_DECODED_PIXELS:40000000}
jack.processing.max-document-pages=${JACK_PROCESSING_MAX_DOCUMENT_PAGES:500}
jack.processing.max-table-rows=${JACK_PROCESSING_MAX_TABLE_ROWS:20000}
jack.processing.max-table-cells=${JACK_PROCESSING_MAX_TABLE_CELLS:400000}
jack.processing.max-archive-entries=${JACK_PROCESSING_MAX_ARCHIVE_ENTRIES:2048}
jack.processing.max-archive-expanded-bytes=${JACK_PROCESSING_MAX_ARCHIVE_EXPANDED_BYTES:134217728}
jack.processing.max-archive-expansion-ratio=${JACK_PROCESSING_MAX_ARCHIVE_EXPANSION_RATIO:100}
jack.processing.max-archive-depth=${JACK_PROCESSING_MAX_ARCHIVE_DEPTH:1}
jack.processing.max-process-output-bytes=${JACK_PROCESSING_MAX_PROCESS_OUTPUT_BYTES:1048576}
jack.processing.max-result-bytes=${JACK_PROCESSING_MAX_RESULT_BYTES:134217728}
