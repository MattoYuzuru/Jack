name: CI CD

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: jack-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "26"
          cache: gradle

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Run frontend lint checks
        run: npm --prefix frontend run lint:check

      - name: Run frontend format checks
        run: npm --prefix frontend run format:check

      - name: Run frontend unit tests
        run: npm --prefix frontend run test:unit -- --run

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run backend tests
        run: ./gradlew --no-daemon test
        working-directory: backend

      - name: Scan backend dependencies
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew --no-daemon dependencyCheckAnalyze
        working-directory: backend

      - name: Generate frontend SBOM
        run: npm sbom --sbom-format cyclonedx --package-lock-only > frontend-sbom.cdx.json
        working-directory: frontend

      - name: Generate backend SBOM
        run: ./gradlew --no-daemon cyclonedxBom
        working-directory: backend

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            frontend/frontend-sbom.cdx.json
            backend/build/reports/dependency-check-report.*
            backend/build/reports/cyclonedx/*.json
          if-no-files-found: warn

      - name: Validate Compose config
        run: docker compose config

  browser-quality:
    name: Browser Quality
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run accessibility, responsive and visual E2E tests
        run: npm --prefix frontend run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn
          retention-days: 7

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs:
      - verify
      - browser-quality
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - component: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.prod
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive image owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Prepare build arguments
        id: build_args
        env:
          PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
        run: |
          if [ "${{ matrix.component }}" = "frontend" ]; then
            api_base="${PROD_API_BASE_URL}"
            if [ -z "${api_base}" ]; then
              api_base="/api"
            fi

            {
              echo "value<<EOF"
              echo "VITE_API_BASE_URL=${api_base}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/jack/${{ matrix.component }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch,prefix=branch-
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ steps.build_args.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
