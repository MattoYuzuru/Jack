name: CI CD

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: jack-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: corretto
          java-version: "26"
          cache: gradle

      - name: Derive dependency-check cache key
        id: dependency-check-cache-key
        shell: bash
        run: echo "hour=$(date -u '+%Y%m%d%H')" >> "$GITHUB_OUTPUT"

      - name: Restore dependency-check database
        id: dependency-check-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.gradle/dependency-check-data
          key: ${{ runner.os }}-dependency-check-v1-${{ steps.dependency-check-cache-key.outputs.hour }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-v1-

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Audit frontend dependencies
        run: npm --prefix frontend audit --audit-level=high

      - name: Run frontend lint checks
        run: npm --prefix frontend run lint:check

      - name: Run frontend format checks
        run: npm --prefix frontend run format:check

      - name: Run frontend unit tests
        run: npm --prefix frontend run test:unit -- --run

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Enforce frontend performance budgets
        run: npm --prefix frontend run budget:check

      - name: Run backend tests
        run: ./gradlew --no-daemon test
        working-directory: backend

      - name: Scan backend dependencies
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew --no-daemon dependencyCheckAnalyze
        working-directory: backend

      - name: Save dependency-check database
        if: ${{ always() && steps.dependency-check-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.gradle/dependency-check-data
          key: ${{ runner.os }}-dependency-check-v1-${{ steps.dependency-check-cache-key.outputs.hour }}

      - name: Generate frontend SBOM
        run: npm sbom --sbom-format cyclonedx --package-lock-only > frontend-sbom.cdx.json
        working-directory: frontend

      - name: Generate backend SBOM
        run: ./gradlew --no-daemon cyclonedxBom
        working-directory: backend

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-reports
          path: |
            frontend/frontend-sbom.cdx.json
            backend/build/reports/dependency-check-report.*
            backend/build/reports/cyclonedx-direct/*.json
          if-no-files-found: warn

      - name: Validate Compose config
        run: docker compose config

  browser-quality:
    name: Browser Quality
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run accessibility, responsive and visual E2E tests
        run: npm --prefix frontend run test:e2e

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn
          retention-days: 7

  publish:
    name: Publish Images
    runs-on: ubuntu-latest
    needs:
      - verify
      - browser-quality
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      matrix:
        include:
          - component: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.prod
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Derive image owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Prepare build arguments
        id: build_args
        env:
          PROD_API_BASE_URL: ${{ vars.PROD_API_BASE_URL }}
        run: |
          if [ "${{ matrix.component }}" = "frontend" ]; then
            api_base="${PROD_API_BASE_URL}"
            if [ -z "${api_base}" ]; then
              api_base="/api"
            fi

            {
              echo "value<<EOF"
              echo "VITE_API_BASE_URL=${api_base}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner }}/jack/${{ matrix.component }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=ref,event=branch,prefix=branch-
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build image for vulnerability gate
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          build-args: ${{ steps.build_args.outputs.value }}
          tags: jack-scan/${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

      - name: Block high and critical image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: jack-scan/${{ matrix.component }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Build and push verified image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ steps.build_args.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          provenance: mode=max
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Sign published image digest
        env:
          IMAGE: ghcr.io/${{ steps.vars.outputs.owner }}/jack/${{ matrix.component }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
