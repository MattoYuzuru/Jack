map $uri $jack_cache_control {
  default "no-store";
  "~^/assets/.+-[A-Za-z0-9_-]{8}\.(?:css|js|woff2?|png|jpe?g|svg|webp)$" "public, max-age=31536000, immutable";
}

server {
  listen 8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-src 'self' blob:; frame-ancestors 'none'; form-action 'self'" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
  add_header X-Frame-Options "DENY" always;
  add_header Cache-Control $jack_cache_control always;

  location ~* "^/assets/.+-[A-Za-z0-9_-]{8}\.(?:css|js|woff2?|png|jpe?g|svg|webp)$" {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
