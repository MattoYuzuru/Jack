apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: jack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jack-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: jack-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/mattoyuzuru/jack/backend:edge
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: JACK_SERVER_PORT
              value: "8080"
            - name: JACK_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: jack-secrets
                  key: postgres-user
            - name: JACK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jack-secrets
                  key: postgres-password
            - name: JACK_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: jack-secrets
                  key: postgres-db
            - name: JACK_DB_URL
              value: jdbc:postgresql://postgres:5432/$(JACK_DB_NAME)
            - name: JACK_WEB_ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: jack-secrets
                  key: web-allowed-origins
            - name: JACK_PROCESSING_STORAGE_ROOT
              value: /data/processing
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: processing-data
              mountPath: /data/processing
      volumes:
        - name: processing-data
          persistentVolumeClaim:
            claimName: jack-processing
