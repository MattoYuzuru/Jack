<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-labelledby="jackLogoTitle jackLogoDesc">
  <title id="jackLogoTitle">Jack logo</title>
  <desc id="jackLogoDesc">Brand logo for Jack, a multi-tool workspace.</desc>
  <defs>
    <linearGradient id="jackLogoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12302d" />
      <stop offset="100%" stop-color="#1d5c55" />
    </linearGradient>
    <linearGradient id="jackLogoAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcf8f" />
      <stop offset="100%" stop-color="#ff8b4d" />
