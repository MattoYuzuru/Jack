services:
  postgres:
    image: postgres:17-alpine
    container_name: jack-postgres
    environment:
      POSTGRES_DB: ${JACK_DB_NAME:-jack}
      POSTGRES_USER: ${JACK_DB_USERNAME:-jack}
      POSTGRES_PASSWORD: ${JACK_DB_PASSWORD:-jack}
    ports:
      - "${JACK_DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - jack-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: jack-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      JACK_SERVER_PORT: 8080
      JACK_DB_URL: jdbc:postgresql://postgres:5432/${JACK_DB_NAME:-jack}
      JACK_DB_USERNAME: ${JACK_DB_USERNAME:-jack}
      JACK_DB_PASSWORD: ${JACK_DB_PASSWORD:-jack}
      JACK_WEB_ALLOWED_ORIGINS: ${JACK_WEB_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      JACK_PROCESSING_STORAGE_ROOT: ${JACK_PROCESSING_STORAGE_ROOT:-/tmp/jack-processing}
      JACK_PROCESSING_MAX_UPLOAD_SIZE_BYTES: ${JACK_PROCESSING_MAX_UPLOAD_SIZE_BYTES:-268435456}
      JACK_PROCESSING_FFMPEG_EXECUTABLE: ${JACK_PROCESSING_FFMPEG_EXECUTABLE:-ffmpeg}
      JACK_PROCESSING_FFPROBE_EXECUTABLE: ${JACK_PROCESSING_FFPROBE_EXECUTABLE:-ffprobe}
      JACK_PROCESSING_MEDIA_PREVIEW_TIMEOUT_SECONDS: ${JACK_PROCESSING_MEDIA_PREVIEW_TIMEOUT_SECONDS:-240}
      JACK_PROCESSING_IMAGE_CONVERT_EXECUTABLE: ${JACK_PROCESSING_IMAGE_CONVERT_EXECUTABLE:-convert}
      JACK_PROCESSING_POTRACE_EXECUTABLE: ${JACK_PROCESSING_POTRACE_EXECUTABLE:-potrace}
      JACK_PROCESSING_RAW_PREVIEW_EXECUTABLE: ${JACK_PROCESSING_RAW_PREVIEW_EXECUTABLE:-dcraw_emu}
      JACK_PROCESSING_IMAGE_PROCESSING_TIMEOUT_SECONDS: ${JACK_PROCESSING_IMAGE_PROCESSING_TIMEOUT_SECONDS:-240}
    ports:
      - "${JACK_BACKEND_PORT:-8080}:8080"
    volumes:
      - ./backend:/workspace
      - jack-gradle-cache:/root/.gradle
    command: >
      sh -lc "chmod +x ./gradlew &&
      ./gradlew --no-daemon bootRun"

  frontend:
    build:
      context: ./frontend
    container_name: jack-frontend
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PORT: ${JACK_FRONTEND_PORT:-5173}
      VITE_API_BASE_URL: ${JACK_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${JACK_FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/workspace
      - jack-frontend-node-modules:/workspace/node_modules
    command: >
      sh -lc "npm ci &&
      npm run dev -- --host 0.0.0.0 --port $$VITE_PORT"

volumes:
  jack-postgres-data:
  jack-gradle-cache:
  jack-frontend-node-modules:
